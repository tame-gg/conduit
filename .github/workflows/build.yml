name: Build Conduit

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up upstream Velocity source
        run: ./scripts/setup.sh --ci

      - name: Build and test
        run: ./gradlew build

      - name: Rename JAR
        run: |
          set -euo pipefail
          VERSION=$(grep "^conduit.version=" gradle.properties | cut -d= -f2)
          shopt -s nullglob
          jars=( proxy/build/libs/velocity-proxy-*-all.jar )
          if [ ${#jars[@]} -ne 1 ]; then
            echo "Expected exactly one shadow JAR, found ${#jars[@]}: ${jars[*]}" >&2
            exit 1
          fi
          mv "${jars[0]}" "proxy/build/libs/conduit-${VERSION}.jar"

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: conduit-${{ github.sha }}
          path: proxy/build/libs/conduit-*.jar
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: '**/build/reports/tests/'
          retention-days: 14
