# conduit.toml — Conduit configuration
# This file is separate from velocity.toml so upstream merges stay clean.
# All settings here are optional; built-in defaults are listed as comments.

# ─────────────────────────────────────────────────────────────────────────────
# [modded] — Settings for modded Minecraft client/server compatibility
# ─────────────────────────────────────────────────────────────────────────────
[modded]

# Maximum number of known data-packs a client may send during the configuration
# phase.  Vanilla Velocity caps this at 64, which is too low for most modpacks.
# Raise this to accommodate heavily modded clients (NeoForge, Fabric with many
# data-pack mods, etc.).  Values above 10 000 may cause memory pressure.
# Overridden at startup by -Dvelocity.max-known-packs=<n> if that JVM flag is set.
max-known-packs = 1024

# Cache the result of the mod-list negotiation per (client-IP, mod-fingerprint)
# pair.  On a re-connect the cached handshake is replayed, skipping the round-
# trip entirely and shaving 50–400 ms off the join time on modded servers.
handshake-cache = true

# How long (seconds) a cached handshake result stays valid.  Set to 0 to disable.
handshake-cache-ttl = 300

# How long (ms) to wait for a modded client to finish the handshake before
# dropping the connection.  Increase for very large modpacks on slow links.
handshake-timeout-ms = 30000

# Enable extra compatibility shims for NeoForge FML3 clients.
# Disabling this only makes sense if you run a purely vanilla / Fabric network.
neoforge-compat = true

# Enable compatibility handling for legacy Forge (FML1/FML2) clients.
legacy-forge-compat = true

# Include a [MODDED] tag in server list ping responses so launchers can filter.
announce-modded-in-ping = false

# Log the full mod list when a modded client connects (verbose; for debugging).
log-mod-handshakes = false


# ─────────────────────────────────────────────────────────────────────────────
# [network] — Low-level networking tuning
# ─────────────────────────────────────────────────────────────────────────────
[network]

# Netty write-buffer watermarks (bytes).  The proxy pauses writes to a channel
# when its buffer exceeds the high mark, and resumes at the low mark.  Higher
# values smooth out bursty traffic at the cost of peak memory; lower values
# reduce latency but may cause micro-stalls under heavy load.
write-buffer-high-watermark = 2097152   # 2 MiB
write-buffer-low-watermark  = 1048576   # 1 MiB

# Skip compressing packets whose compressed size would not be meaningfully
# smaller than the raw size.  The threshold is velocity.toml's
# compression-threshold; this option adds a minimum byte-saving requirement.
# Reduces CPU for near-incompressible payloads (encrypted, image, audio data).
smart-compression = true

# Minimum bytes saved before compression is applied.  Packets where
# (uncompressed – compressed) < this value are sent raw instead.
smart-compression-min-delta = 64

# Batch outbound packets during server transitions to avoid N round-trips.
# Significantly improves transfer speed on modded servers with large state.
packet-queue-optimization = true

# Maximum queued packets per player during a server switch.  Excess packets are
# flushed immediately.  Tune down if memory pressure is observed during switches.
packet-queue-max-depth = 256

# Rate-limit new TCP connections to the proxy (helps under DDoS / bot floods).
connection-throttle = true
connection-throttle-max-per-second = 30

# Cache backend tab-completion responses for a short TTL.  Heavy tab spam on creative/build
# servers currently re-hits the backend; this absorbs the burst at near-zero CPU on the proxy.
# Entries are keyed on (server, prefix), so suggestions cannot leak across backends.  Default
# is OFF because the integration point in ClientPlaySessionHandler is opt-in.
tab-complete-cache              = false
tab-complete-cache-ttl-ms       = 1500
tab-complete-cache-max-entries  = 1024


# ─────────────────────────────────────────────────────────────────────────────
# [diagnostics] — Debug and observability options
# ─────────────────────────────────────────────────────────────────────────────
[diagnostics]

# Emit structured timing logs for every player connection.
# Useful for profiling but adds overhead; keep off in production.
enabled = false

# Log every packet exchanged during the mod handshake phase.
# Implies enabled = true.  Very verbose — use only for debugging.
trace-mod-handshakes = false

# Log a warning when a player's initial login takes longer than this (ms).
slow-connection-threshold-ms = 3000


# ─────────────────────────────────────────────────────────────────────────────
# [server] — Backend health, fallback routing, MOTD cache, shutdown, bot filter
# ─────────────────────────────────────────────────────────────────────────────
[server]

# Periodically ping every registered backend server; servers that don't respond
# within (interval / 2) are marked UNHEALTHY and excluded from fallback routing.
health-check-enabled     = true
health-check-interval-ms = 10000

# Ordered list of preferred fallback server names.  Used both for /server kicks
# (FallbackRouter) and graceful shutdown.  The first server in the list that is
# healthy and registered is chosen.  Leave empty to disable fallback routing.
fallback-servers = []

# Cache server-list ping responses per remote IP.  Cuts CPU for status scanners
# and reduces backend ping volume.  TTL is in milliseconds; the cache is bounded
# to 4 096 distinct IPs (LRU eviction beyond that).
motd-cache-enabled = true
motd-cache-ttl-ms  = 2000

# On JVM shutdown, transfer connected players to a fallback server before the
# proxy exits.  If no fallback is configured (or all are unhealthy/missing) the
# players are disconnected with the configured message.  The shutdown hook
# waits up to graceful-shutdown-timeout-ms for transfers to complete.
graceful-shutdown-enabled    = true
graceful-shutdown-timeout-ms = 5000
graceful-shutdown-message    = "Proxy is restarting. Please reconnect in a moment."

# Block IPs that repeatedly open TCP connections but never finish the handshake
# (a common bot-flood pattern).  An IP that triggers `bot-filter-threshold`
# incomplete handshakes within a rolling 60-second window is blocked for 10
# minutes (renewed by further incomplete handshakes).
bot-filter-enabled    = true
bot-filter-timeout-ms = 3000
bot-filter-threshold  = 10


# ─────────────────────────────────────────────────────────────────────────────
# [security] — Plugin-message channel guard
# ─────────────────────────────────────────────────────────────────────────────
[security]

# Intercept player-originated plugin messages on known cheat / exploit channels
# (World-Downloader, X-Ray clients, etc.).  Matching is case-insensitive; a pattern ending in
# ':' matches any channel under that namespace, otherwise the match is exact.
#
# action:
#   "drop" — silently drop the message; the connection stays open (default).
#   "kick" — drop the message and disconnect the player.
#   "log"  — forward the message but emit a warning log line (useful for evaluation).
#
# Players with the `conduit.channelguard.bypass` permission are exempt from all blocks.
channel-guard          = false
channel-guard-action   = "drop"
channel-guard-block-list = [
    "wdl:init",
    "wdl:control",
    "wdl:request",
    "world_downloader:init",
    "world_downloader:control",
    "world_downloader:request",
    "xaero:",
    "schematica:",
    "bsm:",
    "5zig:",
]


# ─────────────────────────────────────────────────────────────────────────────
# [commands] — Operator commands surfaced by Conduit
# ─────────────────────────────────────────────────────────────────────────────
[commands]

# Register the `/conduit` admin command.  Permission: `conduit.admin`.
# Subcommands: reload, diagnostics, health, unblock <ip>, cache invalidate <ip>
admin-enabled = true

# Register the `/modlist [player]` command.  Permission: `conduit.modlist`.
# Shows the mod loader and registered channel set for each connected player.
modlist-enabled = true


# ─────────────────────────────────────────────────────────────────────────────
# [spark] — Bundled profiler
# ─────────────────────────────────────────────────────────────────────────────
[spark]

# Conduit ships the official spark Velocity profiler and extracts it into
# plugins/ automatically.  If you prefer to manage spark yourself (or don't
# want it), set this to false.  If any spark jar already exists in plugins/,
# Conduit leaves it alone regardless of this setting.
bundle-enabled = true
